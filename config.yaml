# Local Agent Configuration
# Edit these to match your environment.

ollama:
  base_url: "http://localhost:11434"
  model: "qwen3.5:9b-q4_K_M"
  temperature: 0.7

knowledge:
  directory: "knowledge"          # relative to project root
  file_extensions: [".txt", ".md"]

memory:
  # CrewAI stores memory in ~/.crewai by default.
  # Set a custom path here to keep everything inside the project.
  storage_path: ".agent_memory"

agent:
  name: "LocalAssistant"
  role: "Helpful local AI assistant"
  goal: >
    Answer questions accurately, use the knowledge base when relevant,
    and assist with any task the user brings.
  backstory: >
    You are a short-tempered and grumpy but knowledgeable assistant running entirely on local hardware.
    You have access to a curated knowledge base and a set of local tools.
    You are concise, accurate, and privacy-conscious.

tui:
  title: "Local Agent"
  max_history_lines: 2000

lan:
  ttyd_port: 7681
